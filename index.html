<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공감몰 | GongGamMall</title>
    
    <meta property="og:title" content="공감몰 | GongGamMall">
    <meta property="og:description" content="공감몰이 제안하는 프리미엄 컬렉션">
    <meta property="og:url" content="https://gonggammall.vercel.app/">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #ffffff; color: #000; word-break: keep-all; }
        .hidden { display: none; }
        .ssg-header { background-color: #000000; color: #ffffff; }
        .nav-link { color: #ffffff; opacity: 0.7; transition: opacity 0.3s; cursor: pointer; }
        .nav-link:hover { opacity: 1; }
        .active-dot::after { content: ''; display: block; width: 4px; height: 4px; background: #fff; border-radius: 50%; margin: 4px auto 0; }
        .product-card { background: #ffffff; border: none !important; transition: transform 0.3s ease; }
        .brand-text { font-size: 14px; font-weight: 900; letter-spacing: -0.02em; text-transform: uppercase; margin-bottom: 4px; }
        .price-text { font-size: 16px; font-weight: 800; color: #000; margin-top: 8px; }
        .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background: #111; min-width: 200px; padding: 10px 0; z-index: 100; border: 1px solid #333; }
        .nav-item:hover .dropdown-menu { display: block; }
        .qty-btn { width: 32px; height: 32px; border: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .section-title { font-size: 18px; font-weight: 800; border-bottom: 2px solid #000; padding-bottom: 12px; margin-bottom: 24px; text-transform: uppercase; }
        .form-label { font-size: 11px; font-weight: 700; color: #666; width: 110px; display: inline-block; text-transform: uppercase; flex-shrink: 0; }
        .form-input { border-bottom: 1px solid #eee; padding: 10px 0; outline: none; width: 100%; font-size: 14px; background: transparent; }
        .form-input:focus { border-bottom: 1px solid #000; }
        .form-input[readonly] { color: #888; cursor: default; }
        ::-webkit-scrollbar { display: none; }
        @media (max-width: 768px) { .form-label { width: 80px; font-size: 10px; } .pl-offset { padding-left: 0 !important; } }
        .order-status { font-size: 10px; padding: 2px 6px; border-radius: 2px; font-weight: 900; }
        .status-ready { background: #eee; color: #666; }
        .status-request { background: #fef3c7; color: #d97706; }
        .status-cancel { background: #fee2e2; color: #ef4444; }
        .terms-box { font-size: 11px; height: 150px; overflow-y: auto; background: #f9f9f9; padding: 15px; border: 1px solid #eee; margin-top: 5px; color: #666; line-height: 1.6; text-align: left; }
        .delivery-info { font-size: 11px; background: #f8fafc; padding: 12px; border-radius: 4px; border: 1px dashed #cbd5e1; margin-top: 10px; text-align: left; }
        .tracking-link { color: #2563eb; text-decoration: underline; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body>
    <header class="sticky top-0 z-[200] ssg-header shadow-xl">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <h1 class="text-2xl font-black tracking-tighter cursor-pointer italic uppercase" onclick="showMain()">GongGamMall</h1>
            <div class="flex items-center gap-6 text-[11px] font-bold uppercase tracking-widest text-white/70">
                <button id="user-info-btn" class="hidden text-white font-black hover:underline" onclick="showView('mypage')"></button>
                <button onclick="showView('cart')" class="hover:text-white transition flex items-center gap-1">Cart (<span id="cart-count">0</span>)</button>
                <button id="login-btn" onclick="showView('login')" class="hover:text-white transition">Sign In</button>
                <button id="logout-btn" class="hidden hover:text-white transition" onclick="handleLogout()">Logout</button>
            </div>
        </div>
        <nav class="max-w-7xl mx-auto px-6 h-12 flex gap-8 items-center border-t border-white/10">
            <button class="text-[12px] font-bold nav-link active-dot" onclick="showMain()">HOME</button>
            <div id="main-nav" class="flex gap-8 h-full items-center"></div>
        </nav>
    </header>

    <section id="home-view" class="view-section">
        <div class="bg-stone-50 py-32 border-b border-gray-100 text-center">
            <p class="text-[10px] font-black tracking-[0.4em] text-stone-400 mb-6 uppercase">Selected by GongGamMall</p>
            <h2 class="text-5xl md:text-7xl font-black tracking-tighter mb-10 leading-none">ESSENTIALS FOR<br><span class="italic text-stone-300">MODERN LIFE.</span></h2>
            <p class="text-stone-500 text-sm max-w-sm mx-auto font-medium">공감몰이 제안하는 프리미엄 컬렉션.</p>
        </div>
        <div class="max-w-7xl mx-auto px-6 py-24">
            <h3 class="text-3xl font-black tracking-tighter italic mb-16">GongGamMall's TOP 5</h3>
            <div id="top5-container" class="grid grid-cols-1 md:grid-cols-5 gap-10"></div>
        </div>
    </section>

    <footer class="ssg-header py-32 text-center text-[11px] text-white/40 tracking-widest uppercase font-medium">
        <p class="font-black text-white mb-10 italic text-3xl tracking-tighter">GongGamMall</p>
        <div class="space-y-2">
            <p>Company: 공감몰 주식회사</p>
            <p>Representative: 김원석</p>
            <p>Contact: 010-0000-0000</p>
            <p>Email: gonggammall@gmail.com</p>
        </div>
    </footer>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbymsAT-gByE2QYAsPABgNnn5bGIFU741Xqv_I5VNQEbRbBgwgs-UtfMNWjZW6Jwz-ES/exec';
        // 로컬스토리지 키값도 GongGamMall 기반으로 유지
        let allProducts = [], cart = JSON.parse(localStorage.getItem('ggm_cart')) || [];
        let currentUser = JSON.parse(localStorage.getItem('ggm_user'));
        let currentProductObj = null, currentQty = 1, orderType = 'single', previousView = 'home';

        async function init() { 
            updateAuthUI(); 
            await loadProducts(); 
            updateCartBadge(); 

            window.onpopstate = function(event) {
                const view = event.state ? event.state.view : 'home';
                showView(view, false);
            };

            const initialView = window.location.hash.replace('#', '') || 'home';
            showView(initialView, false);
        }

        // ... (이하 JavaScript 로직 내 'GGM' 브랜드 표기 등도 유지)

        function createProductCard(p) {
            return `<div class="product-card group cursor-pointer" onclick="showProductDetail('${p.상품명}')">
                <div class="aspect-[1/1] overflow-hidden bg-gray-50 mb-8"><img src="${p.이미지URL}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"></div>
                <div class="px-2"><p class="brand-text">${p.브랜드 || 'GGM'}</p><h3 class="text-[14px] font-medium text-gray-500 line-clamp-1 mb-2">${p.상품명}</h3><p class="price-text">${Number(p.가격).toLocaleString()} KRW</p></div>
            </div>`;
        }
        
        // 상세 페이지 내 브랜드 표기
        function showProductDetail(name) {
            const currentActiveView = Array.from(document.querySelectorAll('.view-section')).find(el => !el.classList.contains('hidden'));
            if(currentActiveView && currentActiveView.id !== 'detail-view') { previousView = currentActiveView.id.replace('-view', ''); }
            currentProductObj = allProducts.find(p => p.상품명 === name);
            if(!currentProductObj) return;
            currentQty = 1; document.getElementById('order-qty').value = 1;
            document.getElementById('detail-img').src = currentProductObj.이미지URL;
            document.getElementById('detail-brand').innerText = currentProductObj.브랜드 || 'GGM';
            document.getElementById('detail-name').innerText = currentProductObj.상품명;
            document.getElementById('detail-price-val').innerText = Number(currentProductObj.가격).toLocaleString();
            document.getElementById('detail-long-img').src = currentProductObj.상세이미지URL || '';
            updateTotalPrice(); showView('detail');
        }

        init();
    </script>
</body>
</html>
