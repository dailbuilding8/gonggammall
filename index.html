<script>
        // 1. 공감몰 전용 구글 시트 앱스 스크립트 URL 반영
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbymsAT-gByE2QYAsPABgNnn5bGIFU741Xqv_I5VNQEbRbBgwgs-UtfMNWjZW6Jwz-ES/exec';
        
        // 2. 공감몰 로컬 스토리지 키값(ggm_cart, ggm_user) 반영
        let allProducts = [], cart = JSON.parse(localStorage.getItem('ggm_cart')) || [];
        let currentUser = JSON.parse(localStorage.getItem('ggm_user'));
        let currentProductObj = null, currentQty = 1, orderType = 'single', previousView = 'home';

        async function init() { 
            updateAuthUI(); 
            await loadProducts(); 
            updateCartBadge(); 

            window.onpopstate = function(event) {
                const view = event.state ? event.state.view : 'home';
                showView(view, false);
            };

            const initialView = window.location.hash.replace('#', '') || 'home';
            showView(initialView, false);
        }

        function execDaumPostcode(type) {
            new daum.Postcode({
                oncomplete: function(data) {
                    let addr = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;
                    if(type === 'order') {
                        document.getElementById('chk-postcode').value = data.zonecode;
                        document.getElementById("chk-address").value = addr;
                        document.getElementById("chk-address-detail").focus();
                    } else {
                        document.getElementById('reg-postcode').value = data.zonecode;
                        document.getElementById("reg-address").value = addr;
                        document.getElementById("reg-address-detail").focus();
                    }
                }
            }).open();
        }

        function toggleAllAgreements(checked) { document.querySelectorAll('.term-chk').forEach(el => el.checked = checked); }

        async function loadProducts() {
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getProducts`);
                allProducts = await res.json(); renderNav(); renderTop5();
            } catch (e) { console.error("데이터 로드 실패:", e); }
        }

        function renderNav() {
            const navData = {}; allProducts.forEach(p => { if(p.카테고리) { if(!navData[p.카테고리]) navData[p.카테고리] = new Set(); if(p.서브카테고리) navData[p.카테고리].add(p.서브카테고리); }});
            document.getElementById('main-nav').innerHTML = Object.keys(navData).map(cat => `<div class="nav-item relative h-full flex items-center group"><button class="text-[12px] font-bold nav-link h-full uppercase" onclick="filterByCat('${cat}')">${cat}</button><div class="dropdown-menu">${Array.from(navData[cat]).map(sub => `<button class="block w-full text-left px-6 py-3 text-[11px] text-white/60 hover:text-white font-bold uppercase" onclick="filterBySub('${sub}')">${sub}</button>`).join('')}</div></div>`).join('');
        }

        function renderTop5() {
            const top5 = allProducts.filter(p => String(p.TOP5).toUpperCase() === 'Y').slice(0,5);
            document.getElementById('top5-container').innerHTML = top5.map(p => createProductCard(p)).join('');
        }

        function createProductCard(p) {
            return `<div class="product-card group cursor-pointer" onclick="showProductDetail('${p.상품명}')">
                <div class="aspect-[1/1] overflow-hidden bg-gray-50 mb-8"><img src="${p.이미지URL}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"></div>
                <div class="px-2"><p class="brand-text">${p.브랜드 || 'GGM'}</p><h3 class="text-[14px] font-medium text-gray-500 line-clamp-1 mb-2">${p.상품명}</h3><p class="price-text">${Number(p.가격).toLocaleString()} KRW</p></div>
            </div>`;
        }

        function showProductDetail(name) {
            const currentActiveView = Array.from(document.querySelectorAll('.view-section')).find(el => !el.classList.contains('hidden'));
            if(currentActiveView && currentActiveView.id !== 'detail-view') { previousView = currentActiveView.id.replace('-view', ''); }
            currentProductObj = allProducts.find(p => p.상품명 === name);
            if(!currentProductObj) return;
            currentQty = 1; document.getElementById('order-qty').value = 1;
            document.getElementById('detail-img').src = currentProductObj.이미지URL;
            document.getElementById('detail-brand').innerText = currentProductObj.브랜드 || 'GGM';
            document.getElementById('detail-name').innerText = currentProductObj.상품명;
            document.getElementById('detail-price-val').innerText = Number(currentProductObj.가격).toLocaleString();
            document.getElementById('detail-long-img').src = currentProductObj.상세이미지URL || '';
            updateTotalPrice(); showView('detail');
        }

        function goBackFromDetail() { 
            window.history.back();
        }
        function filterByCat(cat) { const filtered = allProducts.filter(p => p.카테고리 === cat); renderCategoryView(cat, filtered); }
        function filterBySub(sub) { const filtered = allProducts.filter(p => p.서브카테고리 === sub); renderCategoryView(sub, filtered); }
        function renderCategoryView(title, products) { document.getElementById('category-title').innerText = title; document.getElementById('product-container').innerHTML = products.map(p => createProductCard(p)).join(''); showView('category'); }

        function showView(view, pushState = true) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById(view + '-view');
            if(target) target.classList.remove('hidden');
            
            if(view === 'cart') renderCart();
            if(view === 'mypage') loadMyPage();
            window.scrollTo(0,0);

            if (pushState) {
                window.history.pushState({ view: view }, '', '#'
